spring:
  datasource:
    url: jdbc:postgresql://{database_url}:{database_port}/{database_name}
    username: ${username}
    password: ${password}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${google_client_id}
            client-secret: ${google_client_secret}

google:
  client-id: ${google_client_id}

jwt:
  secret: ${jwt_secret}

# Google ADK Agent URL — set this once deployed on Cloud Run
agent:
  api:
    url: ${AGENT_API_URL:}
