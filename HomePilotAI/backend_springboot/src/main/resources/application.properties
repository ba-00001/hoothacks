spring.application.name=HomePilotAI

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/homepilotai}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=${SERVER_PORT:8080}

app.jwt.secret=${JWT_SECRET:homepilotai-super-secret-key-homepilotai-super-secret-key}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://10.0.2.2:8080}
